<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gerenciar Usuários — Portal ASI</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--azul:#1a3a5c;--ok:#2d7a3a;--bad:#c0392b;--warn:#b8630a;--bg:#f4f4ef;--card:#fff;--border:#e4e4dc;--txt:#1a1a1a;--txt2:#666;--txt3:#999}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:14px;background:var(--bg);padding-bottom:40px}
.hdr{background:var(--azul);color:#fff;padding:14px 20px;display:flex;align-items:center;justify-content:space-between}
.hdr h1{font-size:16px;font-weight:700}.hdr p{font-size:11px;opacity:.65;margin-top:2px}
.back-btn{font-size:12px;padding:7px 14px;background:rgba(255,255,255,.15);border:none;color:#fff;border-radius:8px;cursor:pointer;text-decoration:none}
.wrap{max-width:900px;margin:0 auto;padding:16px}
.tab-bar{display:flex;gap:0;background:#fff;border-bottom:1px solid var(--border);padding:0 16px}
.tab{font-size:13px;padding:11px 16px;border:none;background:transparent;color:var(--txt2);cursor:pointer;border-bottom:2px solid transparent;font-weight:500}
.tab.on{color:var(--azul);border-bottom-color:var(--azul)}
.sec{display:none}.sec.on{display:block}
.metrics{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px;margin-bottom:16px;margin-top:16px}
.mc{background:var(--card);border-radius:12px;padding:12px 14px;border:1px solid var(--border)}
.mc-lbl{font-size:10px;color:var(--txt3);font-weight:700;text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px}
.mc-val{font-size:20px;font-weight:700;color:var(--azul)}
.mc-val.ok{color:var(--ok)}.mc-val.warn{color:var(--warn)}.mc-val.bad{color:var(--bad)}
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:0 16px}
.user-row{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid #f4f4ef;flex-wrap:wrap}
.user-row:last-child{border-bottom:none}
.avatar{width:38px;height:38px;border-radius:50%;color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:15px;flex-shrink:0}
.user-info{flex:1;min-width:0}
.user-nome{font-weight:600;font-size:14px}
.user-meta{font-size:12px;color:var(--txt3);margin-top:2px}
.badge{font-size:11px;padding:3px 9px;border-radius:99px;font-weight:600}
.badge.ok{background:#e8f5e9;color:#2d7a3a}.badge.warn{background:#fff3e0;color:#b8630a}
.badge.bad{background:#fdecea;color:#c0392b}.badge.blue{background:#e3f0fb;color:#1565c0}.badge.gray{background:#f0efe8;color:#555}
.btn-sm{padding:6px 12px;border-radius:7px;border:none;font-size:12px;cursor:pointer;font-weight:600;margin:2px}
.btn-sm.ok{background:#e8f5e9;color:#2d7a3a}.btn-sm.bad{background:#fdecea;color:#c0392b}
.btn-sm.warn{background:#fff3e0;color:#b8630a}.btn-sm.blue{background:#e3f0fb;color:#1565c0}
.empty{text-align:center;padding:32px;color:var(--txt3);font-size:13px}
.alert{padding:10px 14px;border-radius:10px;font-size:13px;margin-bottom:12px;border:1px solid;display:flex;gap:10px}
.alert.warn{background:#fff3e0;border-color:#ffe0b2;color:#b8630a}
</style>
</head>
<body>
<div class="hdr">
  <div><h1>👥 Gerenciar Usuários</h1><p>Portal Altos Santa Izabel</p></div>
  <a href="index.html" class="back-btn">← Voltar ao portal</a>
</div>
<div class="tab-bar">
  <button class="tab on" onclick="trocarTab('pendentes',this)">🔔 Pendentes <span id="badge-pend"></span></button>
  <button class="tab" onclick="trocarTab('aprovados',this)">✅ Aprovados</button>
  <button class="tab" onclick="trocarTab('rejeitados',this)">❌ Rejeitados</button>
</div>
<div class="wrap">
  <div class="metrics">
    <div class="mc"><div class="mc-lbl">Pendentes</div><div class="mc-val warn" id="cnt-pend">—</div></div>
    <div class="mc"><div class="mc-lbl">Aprovados</div><div class="mc-val ok" id="cnt-aprov">—</div></div>
    <div class="mc"><div class="mc-lbl">Rejeitados</div><div class="mc-val bad" id="cnt-rej">—</div></div>
    <div class="mc"><div class="mc-lbl">Total</div><div class="mc-val" id="cnt-total">—</div></div>
  </div>
  <div class="sec on" id="sec-pendentes">
    <div class="alert warn" id="alerta-pend" style="display:none"><span>🔔</span><div>Há solicitações pendentes de aprovação.</div></div>
    <div class="card" id="lista-pendentes"><div class="empty">Carregando...</div></div>
  </div>
  <div class="sec" id="sec-aprovados">
    <div class="card" id="lista-aprovados"><div class="empty">Carregando...</div></div>
  </div>
  <div class="sec" id="sec-rejeitados">
    <div class="card" id="lista-rejeitados"><div class="empty">Carregando...</div></div>
  </div>
</div>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
<script>
firebase.initializeApp({
  apiKey:"AIzaSyAxifeD5tvV3A4s4SE6d5-P-HyI1Pf0h8s",
  authDomain:"portal-altos-santa-izabel.firebaseapp.com",
  projectId:"portal-altos-santa-izabel",
  storageBucket:"portal-altos-santa-izabel.firebasestorage.app",
  messagingSenderId:"314879065622",
  appId:"1:314879065622:web:76be1b38e018a0cbed3f37"
});
var auth=firebase.auth();
var db=firebase.firestore();

auth.onAuthStateChanged(function(user){
  if(!user){window.location.href='auth.html';return;}
  var u=JSON.parse(localStorage.getItem('asi_usuario')||'{}');
  if(u.perfil!=='admin'){alert('Acesso restrito ao administrador.');window.location.href='index.html';return;}
  carregarUsuarios();
});

function trocarTab(id,btn){
  document.querySelectorAll('.sec').forEach(function(s){s.classList.remove('on');});
  document.querySelectorAll('.tab').forEach(function(b){b.classList.remove('on');});
  document.getElementById('sec-'+id).classList.add('on');
  btn.classList.add('on');
}

function carregarUsuarios(){
  db.collection('usuarios').get().then(function(snap){
    var pend=[],aprov=[],rej=[];
    snap.forEach(function(doc){
      var d=Object.assign({uid:doc.id},doc.data());
      if(d.status==='pendente') pend.push(d);
      else if(d.status==='aprovado') aprov.push(d);
      else rej.push(d);
    });
    var tot=pend.length+aprov.length+rej.length;
    document.getElementById('cnt-pend').textContent=pend.length;
    document.getElementById('cnt-aprov').textContent=aprov.length;
    document.getElementById('cnt-rej').textContent=rej.length;
    document.getElementById('cnt-total').textContent=tot;
    if(pend.length){
      document.getElementById('alerta-pend').style.display='flex';
      document.getElementById('badge-pend').innerHTML='<span style="background:#e74c3c;color:#fff;border-radius:99px;padding:1px 7px;font-size:11px;margin-left:4px">'+pend.length+'</span>';
    }
    renderLista('lista-pendentes',pend,true);
    renderLista('lista-aprovados',aprov,false);
    renderLista('lista-rejeitados',rej,false);
  });
}

var CORES=['#1a3a5c','#2d7a3a','#7c3aed','#b8630a','#c0392b','#0891b2'];
function getColor(c){return CORES[c.charCodeAt(0)%CORES.length];}

function renderLista(elId,users,isPend){
  var el=document.getElementById(elId);
  if(!users.length){el.innerHTML='<div class="empty">Nenhum usuário nesta categoria.</div>';return;}
  el.innerHTML=users.map(function(u){
    var ini=(u.nome||'?').charAt(0).toUpperCase();
    var data=u.criadoEm&&u.criadoEm.toDate?u.criadoEm.toDate().toLocaleDateString('pt-BR'):'—';
    var bTipo=u.tipo==='Proprietário'?'blue':'gray';
    return '<div class="user-row">'+
      '<div class="avatar" style="background:'+getColor(ini)+'">'+ini+'</div>'+
      '<div class="user-info">'+
        '<div class="user-nome">'+u.nome+'</div>'+
        '<div class="user-meta">'+u.email+' · '+u.unidade+' · Solicitado em '+data+'</div>'+
      '</div>'+
      '<span class="badge '+bTipo+'">'+u.tipo+'</span>'+
      (u.perfil==='admin'?'<span class="badge blue">Admin</span>':'')+
      (isPend
        ?'<button class="btn-sm ok" onclick="aprovar(\''+u.uid+'\',\''+u.nome+'\',\''+u.email+'\')">✅ Aprovar</button>'+
          '<button class="btn-sm bad" onclick="rejeitar(\''+u.uid+'\',\''+u.nome+'\')">❌ Rejeitar</button>'
        :(u.status==='aprovado'
          ?'<button class="btn-sm warn" onclick="rejeitar(\''+u.uid+'\',\''+u.nome+'\')">Revogar</button>'+
            (u.perfil==='admin'
              ?'<button class="btn-sm warn" onclick="tornarMorador(\''+u.uid+'\')">→ Morador</button>'
              :'<button class="btn-sm blue" onclick="tornarAdmin(\''+u.uid+'\')">→ Admin</button>')
          :'<button class="btn-sm ok" onclick="aprovar(\''+u.uid+'\',\''+u.nome+'\',\''+u.email+'\')">Aprovar</button>'
        )
      )+'</div>';
  }).join('');
}

function aprovar(uid,nome,email){
  if(!confirm('Aprovar acesso de '+nome+'?'))return;
  db.collection('usuarios').doc(uid).update({status:'aprovado'}).then(function(){
    var assunto=encodeURIComponent('[Portal ASI] Seu acesso foi aprovado!');
    var corpo=encodeURIComponent('Olá, '+nome+'!\n\nSeu acesso ao Portal Altos Santa Izabel foi aprovado.\n\nAcesse: https://condaltosstaizabel.github.io/portal-asi/auth.html\n\nCondomínio Altos Santa Izabel');
    window.open('mailto:'+email+'?subject='+assunto+'&body='+corpo);
    carregarUsuarios();
  });
}
function rejeitar(uid,nome){
  if(!confirm('Rejeitar/revogar acesso de '+nome+'?'))return;
  db.collection('usuarios').doc(uid).update({status:'rejeitado'}).then(carregarUsuarios);
}
function tornarAdmin(uid){
  if(!confirm('Tornar este usuário administrador?'))return;
  db.collection('usuarios').doc(uid).update({perfil:'admin'}).then(carregarUsuarios);
}
function tornarMorador(uid){
  if(!confirm('Remover permissão de admin?'))return;
  db.collection('usuarios').doc(uid).update({perfil:'morador'}).then(carregarUsuarios);
}
</script>
</body>
</html>
