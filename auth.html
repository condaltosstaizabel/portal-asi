<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portal Altos Santa Izabel — Acesso</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--azul:#1a3a5c;--ok:#2d7a3a;--bad:#c0392b;--bg:#f4f4ef;--card:#fff;--border:#e4e4dc;--txt:#1a1a1a;--txt2:#666;--txt3:#999}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:14px;background:var(--bg);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.box{background:var(--card);border-radius:16px;padding:32px 28px;width:100%;max-width:400px;box-shadow:0 4px 24px rgba(0,0,0,.08)}
.logo{text-align:center;margin-bottom:24px}
.logo-img{width:80px;height:80px;border-radius:16px;object-fit:cover;margin-bottom:12px}
.logo h1{font-size:18px;font-weight:700;color:var(--azul)}
.logo p{font-size:12px;color:var(--txt3);margin-top:4px}
.tabs{display:flex;gap:4px;margin-bottom:24px;background:#f4f4ef;border-radius:10px;padding:4px}
.tab{flex:1;padding:8px;border:none;background:transparent;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;color:var(--txt2)}
.tab.on{background:var(--card);color:var(--azul);font-weight:600;box-shadow:0 1px 4px rgba(0,0,0,.08)}
.form-sec{display:none}.form-sec.on{display:block}
.fl{display:block;font-size:12px;color:var(--txt2);font-weight:600;margin-bottom:4px;margin-top:12px}
.fi{width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:9px;font-size:14px;font-family:inherit;background:#fafafa;transition:border-color .15s}
.fi:focus{outline:none;border-color:var(--azul)}
.btn{width:100%;padding:12px;border-radius:9px;border:none;font-size:14px;font-weight:600;cursor:pointer;margin-top:16px}
.btn.primary{background:var(--azul);color:#fff}
.btn:disabled{opacity:.5;cursor:default}
.alert{padding:10px 14px;border-radius:9px;font-size:13px;margin-top:12px;border:1px solid}
.alert.bad{background:#fdecea;border-color:#ffcdd2;color:var(--bad)}
.alert.ok{background:#e8f5e9;border-color:#c8e6c9;color:var(--ok)}
.alert.blue{background:#e3f0fb;border-color:#bbdefb;color:#1565c0}
.spinner{display:inline-block;width:16px;height:16px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite;margin-right:8px;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="box">
  <div class="logo">
    <img src="icon-192.png" class="logo-img" onerror="this.style.display='none'">
    <h1>Portal Altos Santa Izabel</h1>
    <p>Condomínio Residencial</p>
  </div>
  <div class="tabs">
    <button class="tab on" onclick="trocarAba('login',this)">Entrar</button>
    <button class="tab" onclick="trocarAba('cadastro',this)">Solicitar acesso</button>
  </div>
  <div class="form-sec on" id="sec-login">
    <label class="fl">E-mail</label>
    <input class="fi" type="email" id="login-email" placeholder="seu@email.com" autocomplete="email">
    <label class="fl">Senha</label>
    <input class="fi" type="password" id="login-senha" placeholder="Sua senha" autocomplete="current-password" onkeydown="if(event.key==='Enter')fazerLogin()">
    <button class="btn primary" id="btn-login" onclick="fazerLogin()">Entrar</button>
    <div style="text-align:center;margin-top:12px">
      <a href="#" onclick="mostrarReset()" style="font-size:12px;color:var(--azul)">Esqueci minha senha</a>
    </div>
    <div id="msg-login"></div>
  </div>
  <div class="form-sec" id="sec-cadastro">
    <div class="alert blue">📋 Preencha os dados. O síndico receberá sua solicitação e aprovará em até 48h.</div>
    <label class="fl">Nome completo</label>
    <input class="fi" type="text" id="cad-nome" placeholder="Seu nome completo">
    <label class="fl">E-mail</label>
    <input class="fi" type="email" id="cad-email" placeholder="seu@email.com">
    <label class="fl">Senha (mínimo 6 caracteres)</label>
    <input class="fi" type="password" id="cad-senha" placeholder="Crie uma senha">
    <label class="fl">Unidade</label>
    <input class="fi" type="text" id="cad-unidade" placeholder="Ex: Ap. 1121 — Torre 2">
    <label class="fl">Tipo</label>
    <select class="fi" id="cad-tipo">
      <option value="">Selecione...</option>
      <option value="Proprietário">Proprietário</option>
      <option value="Locatário">Locatário</option>
    </select>
    <button class="btn primary" id="btn-cadastro" onclick="solicitarCadastro()">Solicitar acesso</button>
    <div id="msg-cadastro"></div>
  </div>
  <div class="form-sec" id="sec-reset">
    <label class="fl">E-mail cadastrado</label>
    <input class="fi" type="email" id="reset-email" placeholder="seu@email.com">
    <button class="btn primary" onclick="enviarReset()">Enviar link de redefinição</button>
    <div style="text-align:center;margin-top:12px">
      <a href="#" onclick="trocarAba('login',document.querySelectorAll('.tab')[0])" style="font-size:12px;color:var(--txt2)">← Voltar</a>
    </div>
    <div id="msg-reset"></div>
  </div>
</div>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
<script>
emailjs.init('miJa0S-Koq1F9XyMS');
var EJS_SERVICE='service_gfgtirr';
var EJS_TPL_SINDICO='template_kean8pl';
var EJS_TPL_APROVADO='template_p8ekuti';
firebase.initializeApp({
  apiKey:"AIzaSyAxifeD5tvV3A4s4SE6d5-P-HyI1Pf0h8s",
  authDomain:"portal-altos-santa-izabel.firebaseapp.com",
  projectId:"portal-altos-santa-izabel",
  storageBucket:"portal-altos-santa-izabel.firebasestorage.app",
  messagingSenderId:"314879065622",
  appId:"1:314879065622:web:76be1b38e018a0cbed3f37"
});
var auth=firebase.auth();
var db=firebase.firestore();

auth.onAuthStateChanged(function(user){if(user)verificarAcesso(user);});

function trocarAba(id,btn){
  document.querySelectorAll('.form-sec').forEach(function(s){s.classList.remove('on');});
  document.querySelectorAll('.tab').forEach(function(b){b.classList.remove('on');});
  document.getElementById('sec-'+id).classList.add('on');
  if(btn)btn.classList.add('on');
}
function mostrarReset(){
  document.querySelectorAll('.form-sec').forEach(function(s){s.classList.remove('on');});
  document.querySelectorAll('.tab').forEach(function(b){b.classList.remove('on');});
  document.getElementById('sec-reset').classList.add('on');
}
function setMsg(id,msg,tipo){document.getElementById(id).innerHTML=msg?'<div class="alert '+tipo+'">'+msg+'</div>':'';}
function setLoad(id,on,label){var b=document.getElementById(id);b.disabled=on;b.innerHTML=on?'<span class="spinner"></span>Aguarde...':label;}

function fazerLogin(){
  var email=document.getElementById('login-email').value.trim();
  var senha=document.getElementById('login-senha').value;
  if(!email||!senha){setMsg('msg-login','Preencha e-mail e senha.','bad');return;}
  setLoad('btn-login',true,'Entrar'); setMsg('msg-login','','');
  auth.signInWithEmailAndPassword(email,senha)
    .then(function(c){verificarAcesso(c.user);})
    .catch(function(err){
      setLoad('btn-login',false,'Entrar');
      var m={'auth/user-not-found':'E-mail não encontrado.','auth/wrong-password':'Senha incorreta.',
        'auth/invalid-email':'E-mail inválido.','auth/too-many-requests':'Muitas tentativas. Aguarde.'};
      setMsg('msg-login',m[err.code]||'Erro ao entrar.','bad');
    });
}

function verificarAcesso(user){
  db.collection('usuarios').doc(user.uid).get().then(function(doc){
    if(!doc.exists){auth.signOut();setMsg('msg-login','Usuário não encontrado.','bad');setLoad('btn-login',false,'Entrar');return;}
    var d=doc.data();
    if(d.status==='pendente'){auth.signOut();setMsg('msg-login','Acesso aguardando aprovação do síndico.','blue');setLoad('btn-login',false,'Entrar');return;}
    if(d.status==='rejeitado'){auth.signOut();setMsg('msg-login','Acesso negado. Entre em contato com a administração.','bad');setLoad('btn-login',false,'Entrar');return;}
    localStorage.setItem('asi_usuario',JSON.stringify({uid:user.uid,nome:d.nome,email:user.email,perfil:d.perfil||'morador',unidade:d.unidade,tipo:d.tipo}));
    window.location.href='index.html';
  }).catch(function(){setLoad('btn-login',false,'Entrar');setMsg('msg-login','Erro ao verificar acesso.','bad');});
}

function solicitarCadastro(){
  var nome=document.getElementById('cad-nome').value.trim();
  var email=document.getElementById('cad-email').value.trim();
  var senha=document.getElementById('cad-senha').value;
  var unidade=document.getElementById('cad-unidade').value.trim();
  var tipo=document.getElementById('cad-tipo').value;
  if(!nome||!email||!senha||!unidade||!tipo){setMsg('msg-cadastro','Preencha todos os campos.','bad');return;}
  if(senha.length<6){setMsg('msg-cadastro','Senha deve ter mínimo 6 caracteres.','bad');return;}
  setLoad('btn-cadastro',true,'Solicitar acesso'); setMsg('msg-cadastro','','');
  auth.createUserWithEmailAndPassword(email,senha).then(function(cred){
    var uid=cred.user.uid;
    var dados={nome:nome,email:email,unidade:unidade,tipo:tipo,perfil:'morador',status:'pendente',criadoEm:firebase.firestore.FieldValue.serverTimestamp()};
    return db.collection('usuarios').doc(uid).set(dados).then(function(){
      return db.collection('solicitacoes').add(Object.assign({uid:uid},dados));
    }).then(function(){
        // Enviar e-mail para o síndico via EmailJS
        emailjs.send(EJS_SERVICE, EJS_TPL_SINDICO, {
          nome: nome, email: email, unidade: unidade, tipo: tipo,
          link_aprovacao: 'https://condaltosstaizabel.github.io/portal-asi/usuarios.html'
        });
        auth.signOut();
        setLoad('btn-cadastro',false,'Solicitar acesso');
        setMsg('msg-cadastro','✅ Solicitação enviada! O síndico receberá um e-mail e aprovará em até 48h. Você receberá uma confirmação quando aprovado.','ok');
      });
  }).catch(function(err){
    setLoad('btn-cadastro',false,'Solicitar acesso');
    var m={'auth/email-already-in-use':'E-mail já cadastrado.','auth/weak-password':'Senha muito fraca.'};
    setMsg('msg-cadastro',m[err.code]||'Erro ao solicitar.','bad');
  });
}

function enviarReset(){
  var email=document.getElementById('reset-email').value.trim();
  if(!email){setMsg('msg-reset','Informe seu e-mail.','bad');return;}
  auth.sendPasswordResetEmail(email)
    .then(function(){setMsg('msg-reset','✅ Link enviado para '+email,'ok');})
    .catch(function(){setMsg('msg-reset','E-mail não encontrado.','bad');});
}
</script>
</body>
</html>
