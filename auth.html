<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portal Altos Santa Izabel — Acesso</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--azul:#1a3a5c;--ok:#2d7a3a;--bad:#c0392b;--bg:#f4f4ef;--card:#fff;--border:#e4e4dc;--txt:#1a1a1a;--txt2:#666;--txt3:#999}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:14px;background:var(--bg);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.box{background:var(--card);border-radius:16px;padding:32px 28px;width:100%;max-width:400px;box-shadow:0 4px 24px rgba(0,0,0,.08)}
.logo{text-align:center;margin-bottom:24px}
.logo-img{width:80px;height:80px;border-radius:16px;object-fit:cover;margin-bottom:12px}
.logo h1{font-size:18px;font-weight:700;color:var(--azul)}
.logo p{font-size:12px;color:var(--txt3);margin-top:4px}
.tabs{display:flex;gap:4px;margin-bottom:24px;background:#f4f4ef;border-radius:10px;padding:4px}
.tab{flex:1;padding:8px;border:none;background:transparent;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;color:var(--txt2)}
.tab.on{background:var(--card);color:var(--azul);font-weight:600;box-shadow:0 1px 4px rgba(0,0,0,.08)}
.form-sec{display:none}.form-sec.on{display:block}
.fl{display:block;font-size:12px;color:var(--txt2);font-weight:600;margin-bottom:4px;margin-top:12px}
.fi{width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:9px;font-size:14px;font-family:inherit;background:#fafafa;transition:border-color .15s}
.fi:focus{outline:none;border-color:var(--azul)}
.fi select{appearance:none}
.btn{width:100%;padding:12px;border-radius:9px;border:none;font-size:14px;font-weight:600;cursor:pointer;margin-top:16px;transition:opacity .15s}
.btn:active{opacity:.8}
.btn.primary{background:var(--azul);color:#fff}
.btn:disabled{opacity:.5;cursor:default}
.alert{padding:10px 14px;border-radius:9px;font-size:13px;margin-top:12px;border:1px solid}
.alert.bad{background:#fdecea;border-color:#ffcdd2;color:var(--bad)}
.alert.ok{background:#e8f5e9;border-color:#c8e6c9;color:var(--ok)}
.alert.blue{background:#e3f0fb;border-color:#bbdefb;color:#1565c0}
.spinner{display:inline-block;width:16px;height:16px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite;margin-right:8px;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}
.divider{text-align:center;color:var(--txt3);font-size:12px;margin:16px 0;position:relative}
.divider::before,.divider::after{content:'';position:absolute;top:50%;width:42%;height:1px;background:var(--border)}
.divider::before{left:0}.divider::after{right:0}
</style>
</head>
<body>
<div class="box">
  <div class="logo">
    <img src="icon-192.png" class="logo-img" onerror="this.style.display='none'">
    <h1>Portal Altos Santa Izabel</h1>
    <p>Condomínio Residencial</p>
  </div>

  <div class="tabs">
    <button class="tab on" onclick="trocarAba('login',this)">Entrar</button>
    <button class="tab" onclick="trocarAba('cadastro',this)">Solicitar acesso</button>
  </div>

  <!-- LOGIN -->
  <div class="form-sec on" id="sec-login">
    <label class="fl">E-mail</label>
    <input class="fi" type="email" id="login-email" placeholder="seu@email.com" autocomplete="email">
    <label class="fl">Senha</label>
    <input class="fi" type="password" id="login-senha" placeholder="Sua senha" autocomplete="current-password"
      onkeydown="if(event.key==='Enter')fazerLogin()">
    <button class="btn primary" id="btn-login" onclick="fazerLogin()">Entrar</button>
    <div style="text-align:center;margin-top:12px">
      <a href="#" onclick="mostrarResetSenha()" style="font-size:12px;color:var(--azul)">Esqueci minha senha</a>
    </div>
    <div id="msg-login"></div>
  </div>

  <!-- CADASTRO -->
  <div class="form-sec" id="sec-cadastro">
    <div class="alert blue">📋 Preencha os dados abaixo. O síndico receberá sua solicitação e aprovará o acesso em até 48h.</div>
    <label class="fl">Nome completo</label>
    <input class="fi" type="text" id="cad-nome" placeholder="Seu nome completo">
    <label class="fl">E-mail</label>
    <input class="fi" type="email" id="cad-email" placeholder="seu@email.com">
    <label class="fl">Senha (mínimo 6 caracteres)</label>
    <input class="fi" type="password" id="cad-senha" placeholder="Crie uma senha">
    <label class="fl">Unidade</label>
    <input class="fi" type="text" id="cad-unidade" placeholder="Ex: Ap. 1121 — Torre 2">
    <label class="fl">Celular <span style="font-weight:400;color:var(--txt3)">(opcional)</span></label>
    <input class="fi" type="tel" id="cad-cel" placeholder="Ex: (19) 99999-9999">
    <label class="fl">Tipo</label>
    <select class="fi" id="cad-tipo">
      <option value="">Selecione...</option>
      <option value="Proprietário">Proprietário</option>
      <option value="Locatário">Locatário</option>
    </select>
    <button class="btn primary" id="btn-cadastro" onclick="solicitarCadastro()">Solicitar acesso</button>
    <div id="msg-cadastro"></div>
  </div>

  <!-- RESET SENHA -->
  <div class="form-sec" id="sec-reset">
    <label class="fl">E-mail cadastrado</label>
    <input class="fi" type="email" id="reset-email" placeholder="seu@email.com">
    <button class="btn primary" onclick="enviarResetSenha()">Enviar link de redefinição</button>
    <div style="text-align:center;margin-top:12px">
      <a href="#" onclick="trocarAba('login',document.querySelector('.tab'))" style="font-size:12px;color:var(--txt2)">← Voltar ao login</a>
    </div>
    <div id="msg-reset"></div>
  </div>
</div>

<!-- Firebase CDN -->
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
<script>
// Configuração Firebase
firebase.initializeApp({
  apiKey:"AIzaSyAxifeD5tvV3A4s4SE6d5-P-HyI1Pf0h8s",
  authDomain:"portal-altos-santa-izabel.firebaseapp.com",
  projectId:"portal-altos-santa-izabel",
  storageBucket:"portal-altos-santa-izabel.firebasestorage.app",
  messagingSenderId:"314879065622",
  appId:"1:314879065622:web:76be1b38e018a0cbed3f37"
});
var auth=firebase.auth();
var db=firebase.firestore();

// Verificar se já está logado — com flag para evitar loop
var redirecionando=false;
auth.onAuthStateChanged(function(user){
  if(user&&!redirecionando){
    redirecionando=true;
    verificarAcesso(user);
  }
});

function trocarAba(id,btn){
  document.querySelectorAll('.form-sec').forEach(function(s){s.classList.remove('on');});
  document.querySelectorAll('.tab').forEach(function(b){b.classList.remove('on');});
  document.getElementById('sec-'+id).classList.add('on');
  if(btn) btn.classList.add('on');
}

function mostrarResetSenha(){
  document.querySelectorAll('.form-sec').forEach(function(s){s.classList.remove('on');});
  document.querySelectorAll('.tab').forEach(function(b){b.classList.remove('on');});
  document.getElementById('sec-reset').classList.add('on');
}

function setMsg(id,msg,tipo){
  document.getElementById(id).innerHTML=msg?'<div class="alert '+tipo+'">'+msg+'</div>':'';
}

function setLoading(btnId,loading){
  var btn=document.getElementById(btnId);
  btn.disabled=loading;
  btn.innerHTML=loading?'<span class="spinner"></span>Aguarde...':btn.dataset.label||btn.textContent;
  if(!btn.dataset.label&&!loading) btn.dataset.label=btn.textContent;
}

// LOGIN
function fazerLogin(){
  var email=document.getElementById('login-email').value.trim();
  var senha=document.getElementById('login-senha').value;
  if(!email||!senha){setMsg('msg-login','Preencha e-mail e senha.','bad');return;}
  setLoading('btn-login',true); setMsg('msg-login','','');
  auth.signInWithEmailAndPassword(email,senha)
    .then(function(cred){verificarAcesso(cred.user);})
    .catch(function(err){
      setLoading('btn-login',false);
      var msgs={
        'auth/user-not-found':'E-mail não encontrado.',
        'auth/wrong-password':'Senha incorreta.',
        'auth/invalid-email':'E-mail inválido.',
        'auth/too-many-requests':'Muitas tentativas. Aguarde alguns minutos.'
      };
      setMsg('msg-login',msgs[err.code]||'Erro ao entrar. Tente novamente.','bad');
    });
}

function verificarAcesso(user){
  db.collection('usuarios').doc(user.uid).get().then(function(doc){
    if(!doc.exists){
      auth.signOut();
      setMsg('msg-login','Usuário não encontrado. Solicite acesso.','bad');
      setLoading('btn-login',false);
      return;
    }
    var dados=doc.data();
    if(dados.status==='pendente'){
      auth.signOut();
      setMsg('msg-login','Seu acesso está aguardando aprovação do síndico.','blue');
      setLoading('btn-login',false);
      return;
    }
    if(dados.status==='rejeitado'){
      auth.signOut();
      setMsg('msg-login','Seu acesso foi negado. Entre em contato com a administração.','bad');
      setLoading('btn-login',false);
      return;
    }
    // Aprovado — salvar sessão e redirecionar
    localStorage.setItem('asi_usuario',JSON.stringify({
      uid:user.uid, nome:dados.nome, email:user.email,
      perfil:dados.perfil||'morador', unidade:dados.unidade, tipo:dados.tipo
    }));
    window.location.href='index.html';
  }).catch(function(){
    setLoading('btn-login',false);
    setMsg('msg-login','Erro ao verificar acesso. Tente novamente.','bad');
  });
}

// CADASTRO
function solicitarCadastro(){
  var nome=document.getElementById('cad-nome').value.trim();
  var email=document.getElementById('cad-email').value.trim();
  var senha=document.getElementById('cad-senha').value;
  var unidade=document.getElementById('cad-unidade').value.trim();
  var tipo=document.getElementById('cad-tipo').value;
  var cel=document.getElementById('cad-cel').value.trim();
  if(!nome||!email||!senha||!unidade||!tipo){setMsg('msg-cadastro','Preencha todos os campos.','bad');return;}
  if(senha.length<6){setMsg('msg-cadastro','A senha deve ter pelo menos 6 caracteres.','bad');return;}
  setLoading('btn-cadastro',true); setMsg('msg-cadastro','','');

  auth.createUserWithEmailAndPassword(email,senha)
    .then(function(cred){
      var uid=cred.user.uid;
      var dados={
        nome:nome, email:email, unidade:unidade, tipo:tipo,
        perfil:'morador', status:'pendente',
        criadoEm:firebase.firestore.FieldValue.serverTimestamp()
      };
      // Salvar no Firestore
      return db.collection('usuarios').doc(uid).set(dados).then(function(){
        // Salvar solicitação para o admin ver
        return db.collection('solicitacoes').add({
          uid:uid, nome:nome, email:email, unidade:unidade, tipo:tipo,
          status:'pendente', criadoEm:firebase.firestore.FieldValue.serverTimestamp()
        });
      }).then(function(){
        // Enviar e-mail de notificação via mailto
        var assunto=encodeURIComponent('[Portal ASI] Nova solicitação de acesso — '+nome);
        var corpo=encodeURIComponent(
          'Nova solicitação de acesso ao Portal Altos Santa Izabel:\n\n'+
          'Nome: '+nome+'\nE-mail: '+email+'\nUnidade: '+unidade+'\nTipo: '+tipo+'\n\n'+
          'Acesse o portal com sua conta admin para aprovar ou rejeitar.'
        );
        window.open('mailto:altosdesantaizabelcondominio@gmail.com?subject='+assunto+'&body='+corpo);
        auth.signOut();
        setLoading('btn-cadastro',false);
        setMsg('msg-cadastro','✅ Solicitação enviada! Aguarde a aprovação do síndico. Você receberá um e-mail quando aprovado.','ok');
      });
    })
    .catch(function(err){
      setLoading('btn-cadastro',false);
      var msgs={
        'auth/email-already-in-use':'Este e-mail já está cadastrado.',
        'auth/invalid-email':'E-mail inválido.',
        'auth/weak-password':'Senha muito fraca.'
      };
      setMsg('msg-cadastro',msgs[err.code]||'Erro ao solicitar acesso.','bad');
    });
}

// RESET SENHA
function enviarResetSenha(){
  var email=document.getElementById('reset-email').value.trim();
  if(!email){setMsg('msg-reset','Informe seu e-mail.','bad');return;}
  auth.sendPasswordResetEmail(email)
    .then(function(){setMsg('msg-reset','✅ Link de redefinição enviado para '+email,'ok');})
    .catch(function(){setMsg('msg-reset','E-mail não encontrado.','bad');});
}
</script>
</body>
</html>
