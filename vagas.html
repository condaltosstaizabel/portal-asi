<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#1a3a5c">
<title>Vagas de Garagem — Portal ASI</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--azul:#1a3a5c;--bg:#f4f4ef;--card:#fff;--border:#e4e4dc;--txt:#1a1a1a;--txt2:#666;--txt3:#999}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:14px;background:var(--bg);color:var(--txt);min-height:100vh}
.hdr{background:var(--azul);color:#fff;padding:14px 16px 12px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:100}
.back-btn{display:flex;align-items:center;gap:6px;background:rgba(255,255,255,.15);border:none;color:#fff;border-radius:8px;padding:6px 12px;cursor:pointer;font-size:13px;font-weight:600;text-decoration:none;flex-shrink:0}
.hdr-title{flex:1}.hdr-title h1{font-size:15px;font-weight:700}.hdr-title p{font-size:11px;opacity:.65;margin-top:1px}
.wrap{padding:14px;max-width:1100px;margin:0 auto;padding-bottom:40px}
.search-bar{width:100%;padding:10px 14px;border:1px solid var(--border);border-radius:10px;font-size:14px;font-family:inherit;background:#fff;margin-bottom:14px}
.search-bar:focus{outline:none;border-color:var(--azul)}
.torres{display:grid;grid-template-columns:1fr 1fr;gap:16px}
@media(max-width:700px){.torres{grid-template-columns:1fr}}
.torre-box{background:#fff;border:1px solid var(--border);border-radius:16px;overflow:hidden}
.torre-hdr{padding:14px 16px 10px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:baseline}
.torre-hdr h2{font-size:15px;font-weight:700;color:var(--azul)}
.torre-hdr p{font-size:11px;color:var(--txt3);margin-top:2px}
.torre-body{padding:12px 14px}
.andar-sec{margin-bottom:12px}
.andar-label{font-size:10px;font-weight:700;color:var(--txt3);letter-spacing:.06em;text-transform:uppercase;margin-bottom:6px}
.andar-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}
.apto-card{border-radius:10px;padding:8px 6px;text-align:center;cursor:default;border:2px solid transparent;transition:transform .1s}
.apto-card.normal{background:#fff9ec;border-color:#f5c842}
.apto-card.sem{background:#f4f4ef;border-color:#e4e4dc}
.apto-card.especial{background:#f0eeff;border-color:#a78bfa}
.apto-card.pne{background:#e8f5e9;border-color:#81c784}
.apto-card.destaque{border-color:var(--azul)!important;box-shadow:0 0 0 2px rgba(26,58,92,.25)}
.apto-card.editavel{cursor:pointer}.apto-card.editavel:hover{transform:scale(1.04)}
.apto-num{font-size:11px;font-weight:700;color:var(--txt2)}
.vaga-val{font-size:16px;font-weight:800;line-height:1.2;margin-top:3px;color:var(--azul)}
.vaga-val.sem{font-size:12px;color:var(--txt3);font-weight:400}
.legenda{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:14px}
.leg{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--txt2)}
.leg-dot{width:13px;height:13px;border-radius:3px;flex-shrink:0}
.edit-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:500;align-items:center;justify-content:center}
.edit-overlay.on{display:flex}
.edit-box{background:#fff;border-radius:16px;padding:24px;width:92%;max-width:380px}
.edit-box h3{font-size:15px;font-weight:700;color:var(--azul);margin-bottom:16px}
.fl{display:block;font-size:12px;color:var(--txt2);font-weight:600;margin-bottom:3px}
.fi{width:100%;padding:9px 12px;border:1px solid var(--border);border-radius:9px;font-size:14px;font-family:inherit;margin-bottom:10px}
.fi:focus{outline:none;border-color:var(--azul)}
.save-btn{width:100%;padding:11px;border-radius:9px;background:var(--azul);color:#fff;border:none;font-size:14px;font-weight:600;cursor:pointer}
.cancel-btn{width:100%;padding:10px;border-radius:9px;border:1px solid var(--border);background:transparent;color:var(--txt2);cursor:pointer;font-size:13px;margin-top:6px}
</style>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
</head>
<body>

<div class="hdr">
  <a class="back-btn" href="index.html">← Voltar</a>
  <div class="hdr-title">
    <h1>🚗 Vagas de Garagem</h1>
    <p>Altos Santa Izabel · 128 unidades</p>
  </div>
  <div id="btn-edit-admin" style="display:none">
    <button onclick="toggleEdicao()" id="btn-editar" style="background:rgba(255,255,255,.15);border:none;color:#fff;border-radius:8px;padding:6px 12px;cursor:pointer;font-size:13px;font-weight:600">✏️ Editar</button>
  </div>
</div>

<div class="wrap">
  <input class="search-bar" id="busca" placeholder="🔍  Buscar por apartamento ou número da vaga..." oninput="renderTorres()">
  <div class="legenda">
    <div class="leg"><div class="leg-dot" style="background:#fff9ec;border:1.5px solid #f5c842"></div>Com vaga</div>
    <div class="leg"><div class="leg-dot" style="background:#f0eeff;border:1.5px solid #a78bfa"></div>Especial</div>
    <div class="leg"><div class="leg-dot" style="background:#e8f5e9;border:1.5px solid #81c784"></div>PNE</div>
    <div class="leg"><div class="leg-dot" style="background:#f4f4ef;border:1.5px solid #e4e4dc"></div>Sem vaga</div>
  </div>
  <div class="torres" id="torres"></div>
</div>

<div class="edit-overlay" id="editOverlay">
  <div class="edit-box">
    <h3>✏️ Editar vaga</h3>
    <label class="fl">Apartamento</label>
    <input class="fi" id="edit-apto" readonly style="background:#f8f8f4">
    <label class="fl">Número da vaga</label>
    <input class="fi" id="edit-vaga" placeholder="Ex: 042 | V8 | PNE 01 | vazio = sem vaga">
    <button class="save-btn" onclick="salvarEdicao()">💾 Salvar</button>
    <button class="cancel-btn" onclick="fecharEdicao()">Cancelar</button>
  </div>
</div>

<script>
firebase.initializeApp({
  apiKey:"AIzaSyAxifeD5tvV3A4s4SE6d5-P-HyI1Pf0h8s",
  authDomain:"portal-altos-santa-izabel.firebaseapp.com",
  projectId:"portal-altos-santa-izabel",
  storageBucket:"portal-altos-santa-izabel.firebasestorage.app",
  messagingSenderId:"314879065622",
  appId:"1:314879065622:web:76be1b38e018a0cbed3f37"
});
var auth=firebase.auth();
var db=firebase.firestore();
var adminLogado=false;
var modoEdicao=false;
var editandoApto=null;

var vagasData=[
  {"apto":"1001","vaga":"004"},{"apto":"1002","vaga":"127"},{"apto":"1003","vaga":"126"},{"apto":"1004","vaga":"002"},
  {"apto":"1011","vaga":"094"},{"apto":"1012","vaga":"036"},{"apto":"1013","vaga":"020"},{"apto":"1014","vaga":"028"},
  {"apto":"1021","vaga":"034"},{"apto":"1022","vaga":"022"},{"apto":"1023","vaga":"V8"},{"apto":"1024","vaga":"010"},
  {"apto":"1031","vaga":"053"},{"apto":"1032","vaga":"039"},{"apto":"1033","vaga":"042"},{"apto":"1034","vaga":"007"},
  {"apto":"1041","vaga":"075"},{"apto":"1042","vaga":"083"},{"apto":"1043","vaga":"059"},{"apto":"1044","vaga":"055"},
  {"apto":"1051","vaga":"005"},{"apto":"1052","vaga":""},{"apto":"1053","vaga":"091"},{"apto":"1054","vaga":"085"},
  {"apto":"1061","vaga":"030"},{"apto":"1062","vaga":""},{"apto":"1063","vaga":"068"},{"apto":"1064","vaga":"097"},
  {"apto":"1071","vaga":"056"},{"apto":"1072","vaga":"051"},{"apto":"1073","vaga":"049"},{"apto":"1074","vaga":"046"},
  {"apto":"1081","vaga":""},{"apto":"1082","vaga":"65"},{"apto":"1083","vaga":"052"},{"apto":"1084","vaga":"093"},
  {"apto":"1091","vaga":"035"},{"apto":"1092","vaga":"098"},{"apto":"1093","vaga":""},{"apto":"1094","vaga":"041"},
  {"apto":"1101","vaga":"111"},{"apto":"1102","vaga":"114"},{"apto":"1103","vaga":"V9"},{"apto":"1104","vaga":"117"},
  {"apto":"1111","vaga":"029"},{"apto":"1112","vaga":"087"},{"apto":"1113","vaga":"106"},{"apto":"1114","vaga":"PNE 01"},
  {"apto":"1121","vaga":"007"},{"apto":"1122","vaga":"101"},{"apto":"1123","vaga":"069"},{"apto":"1124","vaga":"017"},
  {"apto":"1131","vaga":"054"},{"apto":"1132","vaga":"103"},{"apto":"1133","vaga":"044"},{"apto":"1134","vaga":"096"},
  {"apto":"1141","vaga":"V11"},{"apto":"1142","vaga":""},{"apto":"1143","vaga":"032"},{"apto":"1144","vaga":"V12"},

  {"apto":"2151","vaga":"024"},{"apto":"2152","vaga":"086"},{"apto":"2153","vaga":"113"},{"apto":"2154","vaga":"118"}
];

function carregarVagas(){
  db.collection('portal').doc('vagas').get().then(function(doc){
    if(doc.exists&&doc.data().items&&doc.data().items.length) vagasData=doc.data().items;
    renderTorres();
  }).catch(function(){renderTorres();});
}

function tipoVaga(v){
  if(!v||!v.trim()) return 'sem';
  var u=v.toUpperCase();
  if(u.startsWith('PNE')) return 'pne';
  if(u.startsWith('V')&&isNaN(parseFloat(v))) return 'especial';
  return 'normal';
}

function getAndar(apto){
  // 1001 -> andar 0 (terreo), 1011 -> andar 1, 1151 -> andar 15
  // formato: Torre(1) + Andar(2 digitos) + Unidade(1 digito)
  // mas aptos sao: 1001=Torre1,andar00,unid1; 1011=Torre1,andar01,unid1; 1154=Torre1,andar15,unid4
  var s=apto.toString();
  // remove primeiro digito (torre) e ultimo (unidade), o resto é andar
  var meio=s.slice(1,s.length-1); // ex: '00','01','15'
  return parseInt(meio,10);
}

function renderTorres(){
  var q=(document.getElementById('busca').value||'').toLowerCase().trim();
  var u=JSON.parse(localStorage.getItem('asi_usuario')||'{}');
  var meuApto=(u.unidade||'').replace(/[^0-9]/g,'');

  // mapa apto->vaga
  var mapa={};
  vagasData.forEach(function(v){mapa[v.apto]=v.vaga||'';});

  function buildTorre(torre){
    var prefix=torre+'';
    var aptosT=vagasData.filter(function(v){return v.apto.startsWith(prefix);});

    // agrupar por andar
    var porAndar={};
    aptosT.forEach(function(v){
      var a=getAndar(v.apto);
      if(!porAndar[a]) porAndar[a]=[];
      porAndar[a].push(v.apto);
    });
    var andares=Object.keys(porAndar).map(Number).sort(function(a,b){return a-b;});

    var comVaga=aptosT.filter(function(v){return v.vaga&&v.vaga.trim();}).length;

    var html='<div class="torre-box">'+
      '<div class="torre-hdr">'+
        '<div><h2>Torre '+torre+'</h2><p>Ap. '+prefix+'001 a '+prefix+'154</p></div>'+
        '<span style="font-size:12px;color:var(--txt3);font-weight:500">'+comVaga+'/'+aptosT.length+'</span>'+
      '</div>'+
      '<div class="torre-body">';

    andares.forEach(function(a){
      var label=a===0?'Térreo':(a+'º andar');
      var aptosAndar=porAndar[a].slice().sort();
      html+='<div class="andar-sec">'+
        '<div class="andar-label">'+label+'</div>'+
        '<div class="andar-grid">';

      aptosAndar.forEach(function(apt){
        var vaga=mapa[apt]||'';
        var tipo=tipoVaga(vaga);
        var isMatch=!q||apt.includes(q)||(vaga).toLowerCase().includes(q);
        var isDestaque=apt===meuApto;
        var cls='apto-card '+tipo+(isDestaque?' destaque':'')+(modoEdicao?' editavel':'');
        var onclick=modoEdicao?'onclick="abrirEdicao(\''+apt+'\')"':'';
        html+='<div class="'+cls+'" '+onclick+' style="'+((!q||isMatch)?'':'opacity:.15')+'">'+
          '<div class="apto-num">'+apt+'</div>'+
          (tipo==='sem'
            ? '<div class="vaga-val sem">—</div>'
            : '<div class="vaga-val">'+vaga+'</div>'
          )+
        '</div>';
      });

      html+='</div></div>';
    });

    html+='</div></div>';
    return html;
  }

  document.getElementById('torres').innerHTML=buildTorre(1)+buildTorre(2);

  if(meuApto&&!q){
    setTimeout(function(){
      var el=document.querySelector('.destaque');
      if(el) el.scrollIntoView({behavior:'smooth',block:'center'});
    },150);
  }
}

function toggleEdicao(){
  modoEdicao=!modoEdicao;
  var btn=document.getElementById('btn-editar');
  btn.textContent=modoEdicao?'✅ Editando':'✏️ Editar';
  btn.style.background=modoEdicao?'rgba(255,200,0,.35)':'rgba(255,255,255,.15)';
  renderTorres();
}

function abrirEdicao(apto){
  editandoApto=apto;
  var v=vagasData.find(function(x){return x.apto===apto;})||{};
  document.getElementById('edit-apto').value=apto;
  document.getElementById('edit-vaga').value=v.vaga||'';
  document.getElementById('editOverlay').classList.add('on');
}

function fecharEdicao(){
  document.getElementById('editOverlay').classList.remove('on');
  editandoApto=null;
}

function salvarEdicao(){
  if(!editandoApto) return;
  var novaVaga=document.getElementById('edit-vaga').value.trim();
  var v=vagasData.find(function(x){return x.apto===editandoApto;});
  if(v) v.vaga=novaVaga;
  else vagasData.push({apto:editandoApto,vaga:novaVaga});
  db.collection('portal').doc('vagas').set({items:vagasData}).then(function(){
    fecharEdicao();
    renderTorres();
    alert('✅ Apto '+editandoApto+' → Vaga '+(novaVaga||'(sem vaga)'));
  }).catch(function(e){alert('Erro: '+e.message);});
}

auth.onAuthStateChanged(function(user){
  if(!user){window.location.href='auth.html';return;}
  db.collection('usuarios').doc(user.uid).get().then(function(doc){
    if(!doc.exists||!['aprovado','Aprovado'].includes(doc.data().status)){
      auth.signOut();window.location.href='auth.html';return;
    }
    var d=doc.data();
    localStorage.setItem('asi_usuario',JSON.stringify(Object.assign({uid:user.uid},d)));
    if(d.perfil==='admin'){
      adminLogado=true;
      document.getElementById('btn-edit-admin').style.display='block';
    }
    carregarVagas();
  });
});
</script>
</body>
</html>
